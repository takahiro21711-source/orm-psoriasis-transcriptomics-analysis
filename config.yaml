# Configuration for ORM Psoriasis Analysis Pipeline

data:
  zenodo_id: "4009497"
  zenodo_doi: "10.5281/zenodo.4009497"
  dataset_name: "Manually curated transcriptomics - psoriasis"
  publication: "Federico et al., Sci Data 7, 153 (2020)"

analysis:
  expression:
    normalization_method: "log2"
    pseudocount: 1
  
  differential_expression:
    method: "ttest"
    p_value_threshold: 0.05
    log2fc_threshold: 1.0
  
  correlation:
    method: "pearson"
    min_correlation: 0.5
    p_value_threshold: 0.05
  
  pathway_enrichment:
    method: "hypergeometric"
    p_value_threshold: 0.05

output:
  base_directory: "results"
  figure_format: "png"
  dpi: 300
  generate_html_report: true

genes:
  primary:
    - "ORM1"
    - "ORM2"
  
  related:
    - "CRP"
    - "SAA1"
    - "HP"

transcription_factors:
  inflammatory:
    - "NF-κB"
    - "STAT3"
    - "AP-1"
